services:
  db:
    image: postgres:15-alpine
    container_name: spotly-postgres
    restart: always
    environment:
      POSTGRES_USER: spotly_user
      POSTGRES_PASSWORD: spotly_password
      POSTGRES_DB: SpotlyDb
    ports:
      - "5433:5432"
    volumes:
      - spotly_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotly_user -d SpotlyDb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./spotly-fastapi
    container_name: spotly-fastapi
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://spotly_user:spotly_password@db:5432/SpotlyDb
      SECRET_KEY: spotly-super-secret-key-change-in-prod
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_HOURS: 24
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./spotly-fastapi:/app

volumes:
  spotly_db_data:
